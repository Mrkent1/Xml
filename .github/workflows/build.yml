name: Build XMLProcessor EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install customtkinter
        pip install watchdog
        pip install requests
        pip install psutil
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --add-data "templates;templates" --name "XMLProcessor" icon3.py
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: XMLProcessor-EXE
        path: dist/XMLProcessor.exe
        
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/XMLProcessor.exe
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          🚀 XMLProcessor EXE Build
          
          **Build Info:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref }}
          - Build Number: ${{ github.run_number }}
          
          **Features:**
          - ✅ No Console (--noconsole)
          - ✅ Single File (--onefile)
          - ✅ Templates included
          - ✅ Smart XML overwrite
          - ✅ Telegram bot integration
          
          **Download:**
          - File: `XMLProcessor.exe`
          - Size: See artifact above
